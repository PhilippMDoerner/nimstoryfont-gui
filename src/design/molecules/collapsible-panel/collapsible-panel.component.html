<div class="card" #panel>
  <button btn class="card__button" (click)="togglePanel()">
    <app-heading [headingLevel]="headingLevel()" class="fs-5 card__heading">
      <span class="card__heading-text">
        <ng-content select="[heading]"></ng-content>
      </span>

      <app-icon
        class="card__heading-icon"
        [icon]="_isOpen() ? 'chevron-up' : 'chevron-down'"
      ></app-icon>
    </app-heading>
  </button>

  <div class="card__body" [ngbCollapse]="!_isOpen()">
    <app-separator></app-separator>
    <ng-content select="[body]"></ng-content>
  </div>
</div>
